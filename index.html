  <meta name="theme-color" content="#22c55e">

<style>
/* =========================
   MOBILE: mês inteiro compacto (PWA)
   Cole no final do <style>
   ========================= */
@media (max-width: 520px){

  /* deixa o layout respirar e não “estourar” */
  html, body { overflow-x: hidden; }

  /* topo/painel mais compacto (se existir) */
  .dashboard, .dash, .dashWrap{
    margin: 10px !important;
    padding: 12px !important;
    border-radius: 16px !important;
  }

  /* cartões do painel em coluna */
  .dashGrid, .dashRow, .dashRight, .dashLeft{
    display: block !important;
    width: 100% !important;
  }
  .dashCard{ margin-top: 10px !important; border-radius: 16px !important; }

  /* cabeçalho do mês (setas + título) menor */
  .monthNav, .navRow, .monthHeader{
    gap: 10px !important;
    padding: 8px 10px !important;
  }
  .monthTitle, .monthName{
    font-size: 18px !important;
  }

  /* dias da semana no topo: menor + em “caixinha” */
  .dowItem, .weekDayLabel, .dow{
    font-size: 12px !important;
    padding: 6px 8px !important;
    border-radius: 12px !important;
  }

  /* grid do mês: menos espaço entre células */
  .grid, .monthGrid, .calendarGrid{
    gap: 6px !important;
  }

  /* CÉLULA DO DIA: principal ajuste */
  .day, .cell, .dayCell{
    min-height: 92px !important;     /* mais baixo */
    padding: 7px !important;         /* menos padding */
    border-radius: 14px !important;
  }

  /* topo dentro da célula (número + dia da semana) */
  .dayTop, .cellTop, .dayHeader, .dayNum, .cellNum{
    font-size: 12px !important;
    line-height: 1.1 !important;
    font-weight: 900 !important;
  }

  /* caixinhas brancas Manhã/Tarde mais compactas */
  .slot, .slotBox, .whiteBox{
    padding: 6px 7px !important;
    border-radius: 12px !important;
    margin-top: 6px !important;
  }
  .slotTitle, .slotLabel{
    font-size: 11px !important;
    letter-spacing: .02em !important;
  }
  .slotMain, .slotMainLine{
    font-size: 11px !important;
  }
  .slotSub, .slotSubLine{
    font-size: 10px !important;
    opacity: .86 !important;
  }

  /* pills (NIS / prática / reunião clínica) menores */
  .pill, .tag, .badge, .subTag{
    font-size: 10px !important;
    padding: 3px 7px !important;
    border-radius: 999px !important;
  }

  /* ícones no canto (✅ 📌 🚑 🔥) menores e alinhados */
  .cellMarks, .cellBadges, .dayMarks{
    gap: 6px !important;
    top: 8px !important;
    right: 8px !important;
    transform: scale(.92);
    transform-origin: top right;
  }

  /* pop-up: cabe na tela e rola por dentro */
  .modal, .popup, .dialog{
    width: calc(100vw - 18px) !important;
    max-width: 520px !important;
    max-height: 78vh !important;
    border-radius: 18px !important;
  }
  .modalBody, .popupBody, .dialogBody{
    max-height: 60vh !important;
    overflow: auto !important;
    -webkit-overflow-scrolling: touch;
  }

  /* checklist 4 itens: continua em linha e quebra só se precisar */
  .checkRow, .checklistRow{
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 8px !important;
  }
  .checkItem{
    min-width: 135px !important;
  }
}

/* iPhone/PWA: corrige “altura real” da tela */
html, body { min-height: 100svh; }
</style>

</div>

function keepLine(text){ const t=norm(text); if(!t) return false; if(t.includes("sala de aula")) return false; if(t.includes("intervalo")) return false; return true; }

function buildWeekForDay(day){
  const modelKey=findModelForDate(day);
  const weekday=(day.getDay()+6)%7;
  if(!modelKey || weekday>4) return {modelKey, morning:[], afternoon:[]};
  const rows=MODELS[modelKey]?.rows || [];
  const split=MODELS[modelKey]?.split;
  const col=weekday;
  const morning=[], afternoon=[];
  rows.forEach((r, idx)=>{
    const text=(r[col]||"").trim();
    if(!keepLine(text)) return;
    if (split === null || split === undefined) {
      morning.push(text);
    } else {
      if(idx < split) morning.push(text);
      else if (idx > split) afternoon.push(text);
    }
  });
  return {modelKey, morning, afternoon};
}


function joinSub(base, add){
  if(!add) return base || "";
  const b = (base||"").trim();
  if(!b) return add;
  const up = b.toUpperCase();
  if(up.includes(add.toUpperCase())) return b;
  return b + " • " + add;
}

function daysBetween(d1, d2){
  // datas em meia-noite local para evitar problemas de fuso
  const a = new Date(d1.getFullYear(), d1.getMonth(), d1.getDate());
  const b = new Date(d2.getFullYear(), d2.getMonth(), d2.getDate());
  return Math.round((b - a) / (1000*60*60*24));
}

  const el = document.getElementById("countdown");
  if(!el) return;

  const today = new Date();
  const exams = parseExamDates()
    .map(x => ({...x, d: new Date(x.date+"T00:00:00")}))
    .filter(x => !isNaN(x.d.getTime()))
    .sort((a,b)=>a.d-b.d);

  const next = exams.find(x => daysBetween(today, x.d) >= 0);
  if(!next){
    el.textContent = "";
    return;
  }
  const diff = daysBetween(today, next.d);
  const dd = String(next.d.getDate()).padStart(2,"0");
  const mm = String(next.d.getMonth()+1).padStart(2,"0");

  if(diff === 0){
    el.innerHTML = `🚨 <span>É HOJE: ${next.label}</span> <small>(${dd}/${mm})</small>`;

    el.innerHTML = `⏳ <span>Falta 1 dia para a próxima prova</span> <small>(${dd}/${mm})</small>`;

  }
}

function buildMonthStudyStats(year, monthIndex){
  const daysInMonth = new Date(year, monthIndex+1, 0).getDate();
  let studiedDays = 0;
  let maxStreak = 0;
  let curStreak = 0;
  const set = new Set();
  for(let d=1; d<=daysInMonth; d++){
    const day = new Date(year, monthIndex, d, 12,0,0);
    const iso = isoDate(day);
    const did = studied(iso);
    if(did){
      studiedDays++;
      set.add(iso);
      curStreak++;
      if(curStreak > maxStreak) maxStreak = curStreak;
    }else{
      curStreak = 0;
    }
  }
  return {studiedDays, maxStreak, set};
}

function dayIndexLocal(){
  const now = new Date();
  // índice estável por dia no fuso local: YYYY-MM-DD
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,"0");
  const d = String(now.getDate()).padStart(2,"0");
  const s = y + "-" + m + "-" + d;
  // hash simples
  let h = 0;
  for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i))>>>0;
  return h % DASH_QUOTES.length;
}

  // duolingo streak + últimos 7 dias

function storageKey(dateISO){ return "cal2026:" + dateISO; }
function loadUserData(dateISO){
  try{
    const raw = localStorage.getItem(storageKey(dateISO));
    if(!raw) return {note:"", checks:{chapter:false,resumo:false,flash:false,sim:false}};
    const obj = JSON.parse(raw);
    return {
      note: obj.note || "",
      checks: {
        chapter: !!(obj.checks && obj.checks.chapter),
        resumo:  !!(obj.checks && obj.checks.resumo),
        flash:   !!(obj.checks && obj.checks.flash),
        sim:     !!(obj.checks && obj.checks.sim)
      }
    };
  }catch(e){
    return {note:"", checks:{chapter:false, resumo:false, flash:false, sim:false}};
  }
}
function saveUserData(dateISO, data){
  localStorage.setItem(storageKey(dateISO), JSON.stringify(data));
}

function editKey(dateISO, idx){ return "cal2026:edit:" + dateISO + ":" + idx; }
function metaKey(dateISO){ return "cal2026:editMeta:" + dateISO; }

function loadEdit(dateISO, idx){
  try{

  }catch(e){ return null; }
}
function saveEdit(dateISO, idx, obj){

}
function saveMeta(dateISO, firstTitle){

}
function loadMeta(dateISO){
  try{
    const raw = localStorage.getItem(metaKey(dateISO));

function enablePopupEditing(dateISO){
  const body = document.getElementById("mbody");
  if(!body) return;

  const cards = Array.from(body.querySelectorAll(".card"));
  cards.forEach((card, i)=>{
    const t = card.querySelector(".t");
    const d = card.querySelector(".d");

    // Se o card não tem a estrutura padrão, ignora
    if(!t || !d) return;

    // Corrige "undefined"
    if((t.textContent||"").trim().toLowerCase() === "undefined") t.textContent = "";
    if((d.textContent||"").trim().toLowerCase() === "undefined") d.textContent = "";

    // aplica texto salvo
    const saved = loadEdit(dateISO, i);
    if(saved){
      if(typeof saved.t === "string") t.textContent = saved.t;
      if(typeof saved.d === "string") d.textContent = saved.d;
    }

    // tornar editável
    [t,d].forEach(el=>{
      el.setAttribute("contenteditable","true");
      el.setAttribute("spellcheck","false");
      el.classList.add("editablePop");
      ["mousedown","click","dblclick","touchstart"].forEach(evt=>{
        el.addEventListener(evt, (e)=>{ e.stopPropagation(); });
      });
    });

    // botão salvar (por card)
    let row = card.querySelector(".saveRow");
    if(!row){
      row = document.createElement("div");
      row.className = "saveRow";
      const btn = document.createElement("button");
      btn.className = "saveBtn";
      btn.textContent = "Salvar";
      btn.hidden = true;

      const btnCancel = document.createElement("button");
      btnCancel.className = "saveBtn secondary";
      btnCancel.textContent = "Desfazer";
      btnCancel.hidden = true;

      row.appendChild(btnCancel);
      row.appendChild(btn);
      card.appendChild(row);

      const markDirty = ()=>{ btn.hidden = false; btnCancel.hidden = false; };
      t.addEventListener("input", markDirty);
      d.addEventListener("input", markDirty);

      btnCancel.addEventListener("click", (e)=>{
        e.stopPropagation();
        const prev = loadEdit(dateISO, i);
        if(prev){
          t.textContent = prev.t || "";
          d.textContent = prev.d || "";
        }else{
          // volta ao texto atual original não salvo (não temos mais), então só limpa
          // e mantém do jeito que está.
        }
        btn.hidden = true; btnCancel.hidden = true;
      });

      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        const obj = { t: t.textContent.trim(), d: d.textContent.trim() };
        saveEdit(dateISO, i, obj);

        // lembrete na célula (primeiro título editado)
        let first = "";
        for(let k=0;k<cards.length;k++){
          const ed = loadEdit(dateISO, k);
          if(ed && ed.t && ed.t.trim()){
            first = ed.t.trim();
            break;
          }
        }
        if(!first) first = obj.t;
        saveMeta(dateISO, first);
        btn.hidden = true; btnCancel.hidden = true;

        // re-render para refletir lembrete
        if(typeof render === "function") render();
      });
    }
  });
}

      if(typeof render === "function") render();
      closeModal();
    };
    btnClear.onclick = (e)=>{
      e.stopPropagation();
      ta.value="";
      saveAppt(dateISO, "");
      if(typeof render === "function") render();
    };

    actions.appendChild(btnClear);
    actions.appendChild(btn);
    box.appendChild(ta);
    box.appendChild(actions);

    card.appendChild(t);
    card.appendChild(d);
    card.appendChild(box);
    sec.appendChild(card);
    body.appendChild(sec);
  }

  enablePopupEditing(dateISO);

  if(b) b.style.display = "none";
}
(function registerSW(){
  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=>{
      navigator.serviceWorker.register("./sw.js").catch(()=>{});
    });
  }
  const b = document.getElementById("installBtn");
  if(b) b.addEventListener("click", triggerInstall);
})();
(function iosHint(){
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia && window.matchMedia("(display-mode: standalone)").matches;
  const hint = document.getElementById("iosHint");
  if(isIOS && !isStandalone && hint){
    hint.style.display = "block";
  }
})();


/* =====================
   Login Google (opcional) + Sincronização (Firebase)
   -> Só ativa se você preencher firebaseConfig.
   ===================== */
const firebaseConfig = {
  apiKey: "",
  authDomain: "",
  projectId: "",
  appId: "",
};
let _fb = { enabled:false, user:null };

async function initFirebaseIfConfigured(){
  const ok = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.authDomain && firebaseConfig.projectId;
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  if(!ok){
    if(loginBtn) loginBtn.style.display = "none";
    if(logoutBtn) logoutBtn.style.display = "none";
    return;
  }
  if(loginBtn) loginBtn.style.display = "inline-flex";

  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
  const { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js");
  const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js");

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  _fb = { enabled:true, user:null, db, doc, getDoc, setDoc, auth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut };

  const dashUser = document.getElementById("dashUser");
  const provider = new GoogleAuthProvider();

  async function login(){ try{ await signInWithPopup(auth, provider); }catch(e){ console.warn(e); } }
  async function logout(){ try{ await signOut(auth); }catch(e){} }

  if(loginBtn) loginBtn.addEventListener("click", login);
  if(logoutBtn) logoutBtn.addEventListener("click", logout);

  onAuthStateChanged(auth, async (user)=>{
    _fb.user = user || null;
    if(user){
      if(loginBtn) loginBtn.style.display = "none";
      if(logoutBtn) logoutBtn.style.display = "inline-flex";
      if(dashUser){ dashUser.style.display="inline"; dashUser.textContent = "Olá, " + (user.displayName?.split(" ")[0] || ""); }
      try{
        const ref = doc(db, "calendars", user.uid);
        const snap = await getDoc(ref);
        if(snap.exists()){
          const cloud = snap.data()?.payload || null;
          if(cloud){
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cloud));
            if(typeof render==="function") render();
            if(typeof updateDashboard==="function") updateDashboard();
          }
        }
      }catch(e){ console.warn(e); }
    }else{
      if(loginBtn) loginBtn.style.display = "inline-flex";
      if(logoutBtn) logoutBtn.style.display = "none";
      if(dashUser){ dashUser.style.display="none"; dashUser.textContent=""; }
    }
  });
}
async function syncToCloudDebounced(){
  if(!_fb.enabled || !_fb.user) return;
  clearTimeout(window.__syncTimer);
  window.__syncTimer = setTimeout(async ()=>{
    try{
      const payload = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      if(!payload) return;
      const ref = _fb.doc(_fb.db, "calendars", _fb.user.uid);
      await _fb.setDoc(ref, { payload, updatedAt: Date.now() }, { merge:true });
    }catch(e){ console.warn(e); }
  }, 700);
}
(function hookCloudSync(){
  const _setItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(k, v){
    _setItem(k, v);
    if(k === STORAGE_KEY) syncToCloudDebounced();
  };
  window.addEventListener("load", ()=>{ initFirebaseIfConfigured(); });
})();
